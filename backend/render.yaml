services:
  - type: web
    name: canal-ultrapopular-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_HOURS
        value: "8"
      - key: ALLOWED_ORIGINS
        value: "https://canal-ultrapopular.vercel.app"
    healthCheckPath: /
    autoDeploy: true
